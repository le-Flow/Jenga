#To run the docker compose, use the command "docker compose up"
services:

  frontend:
    container_name: jenga-frontend
    build:
      context: ./frontend/jenga
      dockerfile: Dockerfile.current
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "7000:80"
    networks:
      - openai-network

#backend
  backend: 
    #image: quarkus-backend:latest
    container_name: jenga-backend
    build: 
      context: ./backend/
      dockerfile: Dockerfile.dev
    depends_on:
      db: 
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/backend_db
      QUARKUS_DATASOURCE_USERNAME: dbuser
      QUARKUS_DATASOURCE_PASSWORD: dbpassword
      GOOGLE_API_KEY: your_google_api_key_here
      GOOGLE_CSE_ID: your_custom_search_engine_key_here
      mp.jwt.verify.publickey: |
        -----BEGIN PUBLIC KEY-----
        YOUR_KEY
        -----END PUBLIC KEY-----
    ports: 
      - "8080:8080"
    networks:
      - openai-network



  db:
    container_name: db
    #changed to db from litellm-db
    image: postgres:latest
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dbuser" ]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: db
      #changed to db-server from litellm
      POSTGRES_USER: dbuser
      #changed to dbuser from llmproxy
      POSTGRES_PASSWORD: dbpassword
      #POSTGRES_MULTIPLE_DATABASES: backend_db, frontend_db
      #changed to dbpassword from dbpassword9090
      #PGDATA: ~/Users/li/Documents/Volumes/PostgreSQL/allVolumes
    ports:
      - "5432:5432"
    networks:
      - openai-network
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    environment:
      DATABASE_URL: postgresql://dbuser:dbpassword@db:5432/prometheus_db
    networks:
      - openai-network
        

  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4
    restart: always
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: geheim
    networks:
      - openai-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin2
      #changed to pgadmin2




# Define networks
networks:
  openai-network:
    driver: bridge

# Define volumes
volumes:
  pgadmin-data:
  postgres-data:
    driver: local