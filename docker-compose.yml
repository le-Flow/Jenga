#To run the docker compose, use the command "docker compose up"
services:

  frontend:
    container_name: jenga-frontend
    build:
      context: ./frontend/jenga
      dockerfile: Dockerfile.current
    environment:
      API_UPSTREAM: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "7000:80"
    networks:
      - openai-network

  jwt-keygen:
    image: alpine:latest
    container_name: jwt-keygen
    command: >
      sh -c "apk add --no-cache openssl &&
      openssl genrsa -out /keys/privateKey.pem 2048 &&
      openssl rsa -in /keys/privateKey.pem -pubout -out /keys/publicKey.pem &&
      chmod 600 /keys/privateKey.pem &&
      chmod 644 /keys/publicKey.pem &&
      echo 'Keys generated.'"
    volumes:
      - jwt-keys:/keys 
    restart: "no"


#backend
  backend: 
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: jenga-backend
    depends_on:
      db: 
        condition: service_healthy
      jwt-keygen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/backend_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: dbpassword
      GOOGLE_API_KEY: your_google_api_key_here
      GOOGLE_CSE_ID: your_custom_search_engine_key_here
      SMALLRYE_JWT_SIGN_KEY_LOCATION: file:/keys/privateKey.pem
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: file:/keys/publicKey.pem
      #mp.jwt.verify.publickey: |
      #  -----BEGIN PUBLIC KEY-----
      #  YOUR_KEY
      #  -----END PUBLIC KEY-----
    ports: 
      - "8080:8080"
    volumes:
      - jwt-keys:/keys
    networks:
      - openai-network



  db:
    container_name: db
    #changed to db from litellm-db
    image: postgres:17
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: postgres
      #changed to db-server from litellm
      POSTGRES_USER: postgres
      #changed to dbuser from llmproxy
      POSTGRES_PASSWORD: dbpassword
      #POSTGRES_MULTIPLE_DATABASES: backend_db, frontend_db
      #changed to dbpassword from dbpassword9090
      #PGDATA: ~/Users/li/Documents/Volumes/PostgreSQL/allVolumes
    ports:
      - "5432:5432"
    networks:
      - openai-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    environment:
      DATABASE_URL: postgresql://dbuser:dbpassword@db:5432/prometheus_db
    networks:
      - openai-network
        

  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4
    restart: always
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: geheim
    networks:
      - openai-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      #changed to pgadmin2




# Define networks
networks:
  openai-network:
    driver: bridge

# Define volumes
volumes:
  jwt-keys:
    driver: local
  pgadmin-data:
  postgres-data:
    driver: local